<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexBot — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080f;--surface:#111118;--border:#2a2a3a;--text:#f0f0ff;--muted:#8888aa;--accent:#7c6fff;--accent2:#ff6b8a;--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px}
.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:var(--muted);font-size:0.9rem;margin-bottom:32px}
.tabs{display:flex;background:#0d0d16;border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;font-size:0.88rem;font-weight:600;color:var(--muted);transition:all 0.2s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.form{display:none}.form.active{display:block}
label{display:block;font-size:0.8rem;font-weight:600;color:var(--muted);margin-bottom:6px;margin-top:16px}
label:first-of-type{margin-top:0}
input{width:100%;background:#0d0d16;border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:inherit;font-size:0.9rem;color:var(--text);transition:border-color 0.2s}
input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:20px;transition:opacity 0.2s}
.btn-grad{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-grad:hover{opacity:0.88}

.msg{padding:10px 14px;border-radius:8px;font-size:0.84rem;margin-top:14px;display:none}
.msg.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171}
.msg.success{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:#4ade80}
.back{text-align:center;margin-top:20px;font-size:0.82rem;color:var(--muted)}
.back a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">NexBot</div>
  <div class="subtitle">Sign in to access your NexBot dashboard</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('signup')">Sign Up</div>
  </div>

  <!-- LOGIN -->
  <div class="form active" id="form-login">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="you@example.com"/>
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••"/>
    <button class="btn btn-grad" onclick="login()">Sign In →</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- SIGNUP -->
  <div class="form" id="form-signup">
    <label>Full Name</label>
    <input type="text" id="signup-name" placeholder="Your Name"/>
    <label>Email</label>
    <input type="email" id="signup-email" placeholder="you@example.com"/>
    <label>Password</label>
    <input type="password" id="signup-password" placeholder="Min 6 characters"/>
    <button class="btn btn-grad" onclick="signup()">Create Account →</button>
    <div class="msg" id="signup-msg"></div>
  </div>

  <div class="back"><a href="/">← Back to Home</a></div>
</div>

<script>
const SUPABASE_URL = 'https://vzfrpjskttlygmxuptek.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9KaYFTVWVjrPNvRISw5s1g_P9yhVz0N';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Check if already logged in
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href = '/app';
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('form-login').classList.toggle('active', tab==='login');
  document.getElementById('form-signup').classList.toggle('active', tab==='signup');
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if(!email||!password){ showMsg('login-msg','error','Please fill in all fields'); return; }
  const {error} = await sb.auth.signInWithPassword({email, password});
  if(error){ showMsg('login-msg','error',error.message); return; }
  window.location.href = '/app';
}

async function signup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if(!name||!email||!password){ showMsg('signup-msg','error','Please fill in all fields'); return; }
  if(password.length < 6){ showMsg('signup-msg','error','Password must be at least 6 characters'); return; }
  const {error} = await sb.auth.signUp({email, password, options:{data:{full_name:name}}});
  if(error){ showMsg('signup-msg','error',error.message); return; }
  showMsg('signup-msg','success','Account created! Check your email to confirm, then sign in.');
}

</script>
</body>
</html>
